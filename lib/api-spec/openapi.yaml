openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trading bot API for Trading 212
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot control operations
  - name: trades
    description: Trade history
  - name: positions
    description: Open positions
  - name: instruments
    description: Watchlist instruments
  - name: signals
    description: MA crossover signals
  - name: assistant
    description: AI day-trading assistant chat
  - name: signalAnalyst
    description: Claude-powered Signal Analyst chat
  - name: dailyMarketBrief
    description: AI-generated daily market briefs
  - name: admin
    description: Admin-only customer/tenant management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create an account and start a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "409":
          description: An account with this email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and start a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: End the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: The currently logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get current bot status and config
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the trading bot
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the trading bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/resume:
    post:
      operationId: resumeBot
      tags: [bot]
      summary: Clear a tripped daily-loss circuit breaker and restart the bot
      responses:
        "200":
          description: Bot resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/config:
    patch:
      operationId: updateBotConfig
      tags: [bot]
      summary: Update bot strategy configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigInput"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /broker/connect:
    post:
      operationId: connectBroker
      tags: [broker]
      summary: Connect (or replace) this user's broker credentials
      description: >
        Tests the credentials against the broker before saving. Credentials are
        encrypted at rest and never returned to the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerConnectInput"
      responses:
        "201":
          description: Broker connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerStatus"
        "400":
          description: Invalid input or the credentials did not work
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /broker/status:
    get:
      operationId: getBrokerStatus
      tags: [broker]
      summary: This user's current broker connection status
      responses:
        "200":
          description: Broker connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerStatus"

  /broker/disconnect:
    delete:
      operationId: disconnectBroker
      tags: [broker]
      summary: Disconnect this user's broker (also stops their bot if running)
      responses:
        "204":
          description: Disconnected

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trade history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Trade list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/execute:
    post:
      operationId: executeTrade
      tags: [trades]
      summary: Manually execute a trade through the configured broker
      description: >
        Places a market order on the broker selected in the bot configuration,
        respecting the same Dry Run safety flag and stop-loss settings. When Dry
        Run is enabled the order is logged but not sent to the broker.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteTradeInput"
      responses:
        "201":
          description: Trade recorded (inspect status for FILLED / FAILED / DRY_RUN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "429":
          description: A matching order is already being placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "502":
          description: Could not fetch price or reach broker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /quote:
    get:
      operationId: getQuote
      tags: [trades]
      summary: Get a live price quote for an instrument from the configured broker
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Live quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Missing ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "502":
          description: Could not fetch quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /positions:
    get:
      operationId: listPositions
      tags: [positions]
      summary: Get open positions from Trading 212
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /account:
    get:
      operationId: getAccount
      tags: [bot]
      summary: Get Trading 212 account summary
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummary"

  /instruments:
    get:
      operationId: listInstruments
      tags: [instruments]
      summary: List watchlist instruments
      responses:
        "200":
          description: Instrument list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Instrument"
    post:
      operationId: addInstrument
      tags: [instruments]
      summary: Add instrument to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstrumentInput"
      responses:
        "201":
          description: Instrument added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instrument"

  /instruments/{id}:
    delete:
      operationId: deleteInstrument
      tags: [instruments]
      summary: Remove instrument from watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: Get recent MA crossover signals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Signal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /signals/run:
    post:
      operationId: runSignalCheck
      tags: [signals]
      summary: Manually trigger a signal check for all instruments
      responses:
        "200":
          description: Signals generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /candles:
    get:
      operationId: getCandles
      tags: [candles]
      summary: OHLC candles for an instrument (from Capital.com)
      parameters:
        - name: epic
          in: query
          required: true
          schema:
            type: string
        - name: resolution
          in: query
          description: Candle timeframe (MINUTE, MINUTE_5, MINUTE_15, MINUTE_30, HOUR, HOUR_4, DAY, WEEK)
          schema:
            type: string
            default: HOUR
        - name: count
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Candle list (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"

  /scanner/status:
    get:
      operationId: getScannerStatus
      tags: [scanner]
      summary: Get scanner status and configuration
      responses:
        "200":
          description: Scanner status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerStatus"

  /scanner/config:
    post:
      operationId: updateScannerConfig
      tags: [scanner]
      summary: Update scanner configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScannerConfigInput"
      responses:
        "200":
          description: Updated scanner status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerStatus"

  /scanner/run:
    post:
      operationId: runScan
      tags: [scanner]
      summary: Manually trigger a market scan
      responses:
        "200":
          description: Scan results summary
          content:
            application/json:
              schema:
                type: object
                required: [scanned, hits]
                properties:
                  scanned:
                    type: integer
                  hits:
                    type: integer

  /news:
    get:
      operationId: getMarketNews
      tags: [news]
      summary: Get high-impact market news filtered by importance
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of high-impact news items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"

  /scanner/results:
    get:
      operationId: getScannerResults
      tags: [scanner]
      summary: Get recent scanner hits
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of scanner hits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScannerResult"

  /backtest:
    get:
      operationId: getBacktest
      tags: [backtest]
      summary: Deterministic backtest of both strategies over recent price history
      description: >-
        Runs trend-following and mean-reversion over recent close-price history
        for every enabled instrument and returns per-strategy, per-instrument
        performance stats plus an equity curve. All numbers are computed in code
        (no LLM). Intended as the "is this strategy working" evidence before
        turning on live automation.
      responses:
        "200":
          description: Backtest results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestReport"

  /activity:
    get:
      operationId: getActivityFeed
      tags: [activity]
      summary: Unified chronological feed of scans, signals, and trades
      description: >-
        Merges scanner hits, strategy signals (with any Claude review reason),
        and executed/failed trades into one reverse-chronological stream for the
        dashboard. Additive — the standalone Scanner/Signals/Trades pages remain
        the detailed views.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Max rows fetched per source before merging.
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityFeed"

  /assistant/conversations:
    get:
      operationId: listConversations
      tags: [assistant]
      summary: List all assistant conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [assistant]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /assistant/conversations/{id}:
    get:
      operationId: getConversation
      tags: [assistant]
      summary: Get a conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
    delete:
      operationId: deleteConversation
      tags: [assistant]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /assistant/conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [assistant]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssistantMessage"
    post:
      operationId: sendMessage
      tags: [assistant]
      summary: Send a message and receive a streaming assistant response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /signal-analyst/conversations:
    get:
      operationId: listSignalConversations
      tags: [signalAnalyst]
      summary: List all Signal Analyst conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createSignalConversation
      tags: [signalAnalyst]
      summary: Create a new Signal Analyst conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /signal-analyst/conversations/{id}:
    get:
      operationId: getSignalConversation
      tags: [signalAnalyst]
      summary: Get a Signal Analyst conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
    delete:
      operationId: deleteSignalConversation
      tags: [signalAnalyst]
      summary: Delete a Signal Analyst conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /signal-analyst/conversations/{id}/messages:
    get:
      operationId: listSignalMessages
      tags: [signalAnalyst]
      summary: List messages in a Signal Analyst conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssistantMessage"
    post:
      operationId: sendSignalMessage
      tags: [signalAnalyst]
      summary: Send a message and receive a streaming Signal Analyst response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: SSE stream of analyst text chunks
          content:
            text/event-stream: {}

  /daily-market-brief/latest:
    get:
      operationId: getLatestDailyBrief
      tags: [dailyMarketBrief]
      summary: Get the latest saved daily market brief
      responses:
        "200":
          description: The latest daily market brief, or null if none exists yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestDailyBriefResult"

  /daily-market-brief/create:
    post:
      operationId: createDailyBrief
      tags: [dailyMarketBrief]
      summary: Generate a new daily market brief with Claude, save it, and return it
      responses:
        "201":
          description: The newly generated daily market brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyMarketBrief"
        "502":
          description: Failed to generate the brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /market-news:
    get:
      operationId: listMarketNews
      tags: [marketNews]
      summary: List market news (live RSS, persisted; mock fallback if empty)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Market news list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketNewsList"

  /market-news/analyse:
    post:
      operationId: analyseNews
      tags: [marketNews]
      summary: Analyse a news item with Claude (affected assets, sentiment, impact, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyseNewsInput"
      responses:
        "200":
          description: AI analysis of the news item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsAnalysis"
        "400":
          description: Missing headline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "502":
          description: Failed to analyse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /market-brain/latest:
    get:
      operationId: getLatestMarketBrain
      tags: [marketBrain]
      summary: Latest AI Market Brain snapshot (self-populating)
      responses:
        "200":
          description: The latest market brain snapshot, or null if none exists yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestMarketBrainResult"

  /market-brain/generate:
    post:
      operationId: generateMarketBrain
      tags: [marketBrain]
      summary: Generate a new market brain snapshot with Claude
      responses:
        "201":
          description: The newly generated market brain snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketBrainSnapshot"
        "429":
          description: A snapshot was generated too recently (cooldown)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "502":
          description: Failed to generate the snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /charts/insight:
    get:
      operationId: getChartInsight
      tags: [charts]
      summary: AI technical read for an instrument (trend, S/R, volatility, confidence)
      parameters:
        - name: epic
          in: query
          required: true
          schema:
            type: string
        - name: resolution
          in: query
          schema:
            type: string
            default: HOUR
      responses:
        "200":
          description: Chart insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartInsight"
        "400":
          description: Missing epic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "502":
          description: Failed to compute insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /performance/coach:
    get:
      operationId: getPerformanceCoach
      tags: [performance]
      summary: Behavioural performance analytics + AI coaching from trade history
      responses:
        "200":
          description: Performance coach report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceCoach"

  /assistant/daily-brief:
    get:
      operationId: getAssistantDailyBrief
      tags: [assistant]
      summary: Proactive daily assistant briefing (self-populating, one per day)
      responses:
        "200":
          description: The latest assistant daily brief, or null if none exists yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestAssistantBriefResult"

  /trade-intelligence/evaluate-with-claude:
    post:
      operationId: evaluateTradeIntelligenceWithClaude
      tags: [tradeIntelligence]
      summary: Claude-generated plain-English trade intelligence report from pre-computed factor scores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeIntelligenceInput"
      responses:
        "200":
          description: AI trade intelligence report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeIntelligenceReport"
        "400":
          description: Missing or malformed input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "502":
          description: Failed to generate the report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /admin/customers:
    get:
      operationId: listAdminCustomers
      tags: [admin]
      summary: List every customer with broker/bot/subscription/activity summary
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCustomerList"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /admin/customers/{id}/suspend:
    post:
      operationId: suspendCustomer
      tags: [admin]
      summary: Suspend a customer — blocks login and immediately force-stops their bot and live stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuspendResult"
        "400":
          description: Invalid customer id, or attempting to suspend your own account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /admin/customers/{id}/unsuspend:
    post:
      operationId: unsuspendCustomer
      tags: [admin]
      summary: Restore a suspended customer's access
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer unsuspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuspendResult"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /admin/customers/{id}:
    delete:
      operationId: deleteCustomer
      tags: [admin]
      summary: Permanently delete a customer and all their data (force-stops their bot and live stream first)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Customer deleted
        "400":
          description: Invalid customer id, or attempting to delete your own account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /admin/customers/{id}/subscription:
    put:
      operationId: updateCustomerSubscription
      tags: [admin]
      summary: Admin-authored plan/billing status for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "400":
          description: Invalid plan or status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

  /admin/customers/{id}/contracts:
    get:
      operationId: listCustomerContracts
      tags: [admin]
      summary: List a customer's uploaded contract/legal documents (metadata only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractList"

  /admin/contracts/{contractId}:
    delete:
      operationId: deleteContract
      tags: [admin]
      summary: Delete a contract document
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Contract deleted
        "404":
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantError"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [customer, admin]

    BotStatus:
      type: object
      required: [running, config, circuitBreaker]
      properties:
        running:
          type: boolean
        lastRunAt:
          type: ["string", "null"]
        nextRunAt:
          type: ["string", "null"]
        config:
          $ref: "#/components/schemas/BotConfig"
        circuitBreaker:
          $ref: "#/components/schemas/CircuitBreaker"

    CircuitBreaker:
      type: object
      required: [tripped]
      description: Daily-loss circuit breaker state. When tripped, the bot is stopped and will not trade until manually resumed.
      properties:
        tripped:
          type: boolean
          description: True when the daily loss limit has been hit and trading is halted.
        reason:
          type: ["string", "null"]
          description: Human-readable explanation of why the breaker tripped.
        trippedAt:
          type: ["string", "null"]
          description: ISO timestamp when the breaker tripped.
        dayStartEquity:
          type: ["number", "null"]
          description: Account total equity recorded at the start of the current UTC day, used as the loss baseline.

    BotConfig:
      type: object
      required: [shortPeriod, longPeriod, tradeAmount, intervalMinutes, dryRun, broker, stopLossPercent, takeProfitPercent, riskPerTradePercent, maxPositionSizePercent, maxDailyLossPercent, maxConcurrentPositions, aiTradeMode, regimeFilterEnabled, barResolution]
      properties:
        shortPeriod:
          type: integer
          description: Short MA period (e.g. 9)
        longPeriod:
          type: integer
          description: Long MA period (e.g. 21)
        tradeAmount:
          type: number
          description: Fixed amount in account currency per trade (ignored when riskPerTradePercent > 0)
        intervalMinutes:
          type: integer
          description: How often to run signal check (minutes)
        dryRun:
          type: boolean
          description: If true, log signals but do not place orders
        broker:
          type: string
          enum: [trading212, capitalcom]
          description: Which broker to route trades through
        stopLossPercent:
          type: number
          description: Stop-loss distance as % of entry price (e.g. 2 = 2%). 0 disables stop loss.
        takeProfitPercent:
          type: number
          description: Take-profit distance as % of entry price (e.g. 4 = 4%). 0 disables take profit. Capital.com only — ignored on Trading 212.
        riskPerTradePercent:
          type: number
          description: Account balance % to risk per trade for position sizing (e.g. 1 = 1%). 0 uses fixed tradeAmount.
        maxPositionSizePercent:
          type: number
          description: Hard cap on a single position's value as % of account balance (e.g. 5 = 5%). Position size is clamped to this. 0 disables the cap.
        maxDailyLossPercent:
          type: number
          description: Daily-loss circuit breaker threshold as % of the day-start equity (e.g. 3 = 3%). When reached, the bot stops and must be manually resumed. 0 disables the breaker.
        maxConcurrentPositions:
          type: integer
          description: Maximum number of simultaneously open positions. New entries (long or short) are blocked at this limit; trades on an already-open ticker are unaffected. 0 disables the cap.
        aiTradeMode:
          type: string
          enum: [off, guard, autonomous]
          description: How Claude participates in execution. off = strategy only; guard = Claude approves/vetoes each MA signal; autonomous = Claude decides trades.
        regimeFilterEnabled:
          type: boolean
          description: When true, each instrument is classified trending/ranging (close-based ADX) and routed to trend-following or mean-reversion automatically. When false, only trend-following runs.
        barResolution:
          type: string
          enum: [MINUTE, MINUTE_5, MINUTE_15, MINUTE_30, HOUR, HOUR_4, DAY, WEEK]
          description: Capital.com candle resolution the bot fetches signals at. The scanner and backtest always mirror this same value — there is no separate setting for them.

    BotConfigInput:
      type: object
      properties:
        shortPeriod:
          type: integer
        longPeriod:
          type: integer
        tradeAmount:
          type: number
        intervalMinutes:
          type: integer
        dryRun:
          type: boolean
        broker:
          type: string
          enum: [trading212, capitalcom]
        stopLossPercent:
          type: number
          description: Stop-loss distance as % of entry price. 0 disables.
        takeProfitPercent:
          type: number
          description: Take-profit distance as % of entry price. 0 disables. Capital.com only.
        riskPerTradePercent:
          type: number
          description: Account balance % to risk per trade. 0 uses fixed tradeAmount.
        maxPositionSizePercent:
          type: number
          description: Hard cap on a single position's value as % of account balance. 0 disables.
        maxDailyLossPercent:
          type: number
          description: Daily-loss circuit breaker threshold as % of day-start equity. 0 disables.
        maxConcurrentPositions:
          type: integer
          description: Maximum number of simultaneously open positions. New entries (long or short) are blocked at this limit; trades on an already-open ticker are unaffected. 0 disables the cap.
        aiTradeMode:
          type: string
          enum: [off, guard, autonomous]
          description: How Claude participates in execution.
        regimeFilterEnabled:
          type: boolean
          description: Enable automatic trending/ranging routing between trend-following and mean-reversion.
        barResolution:
          type: string
          enum: [MINUTE, MINUTE_5, MINUTE_15, MINUTE_30, HOUR, HOUR_4, DAY, WEEK]
          description: Capital.com candle resolution the bot fetches signals at.

    BrokerConnectInput:
      type: object
      required: [broker]
      properties:
        broker:
          type: string
          enum: [trading212, capitalcom]
        capital:
          type: object
          description: Required when broker is capitalcom.
          properties:
            apiKey:
              type: string
            identifier:
              type: string
            password:
              type: string
        trading212:
          type: object
          description: Required when broker is trading212.
          required: [apiKey, apiSecret]
          properties:
            apiKey:
              type: string
            apiSecret:
              type: string
              description: Trading 212 API secret — the API authenticates with a key+secret pair (HTTP Basic).

    BrokerStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        broker:
          type: string
          enum: [trading212, capitalcom]
        identifierMasked:
          type: string
          description: Partially masked identifier/key for display — never the credential itself.

    Trade:
      type: object
      required: [id, ticker, side, quantity, price, executedAt, status]
      properties:
        id:
          type: integer
        ticker:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        quantity:
          type: number
        price:
          type: number
        total:
          type: number
        executedAt:
          type: string
        status:
          type: string
          enum: [FILLED, FAILED, DRY_RUN]
        errorMessage:
          type: ["string", "null"]
        orderId:
          type: ["string", "null"]
        aiReason:
          type: ["string", "null"]
          description: Claude's plain-language reason for approving/making this trade (AI modes only).
        aiConfidence:
          type: ["string", "null"]
          description: Claude's confidence in this trade (low/medium/high; AI modes only).

    ExecuteTradeInput:
      type: object
      required: [ticker, side, amount]
      properties:
        ticker:
          type: string
          description: Instrument symbol / epic to trade
        side:
          type: string
          enum: [BUY, SELL]
        amount:
          type: number
          description: Trade value in account currency; quantity is derived from the latest price

    Quote:
      type: object
      required: [ticker, bid, offer, price]
      properties:
        ticker:
          type: string
        bid:
          type: number
        offer:
          type: number
        price:
          type: number
          description: Mid price ((bid + offer) / 2)
        marketStatus:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]

    Position:
      type: object
      required: [ticker, quantity, averagePrice, currentPrice, pnl, pnlPercent]
      properties:
        ticker:
          type: string
        quantity:
          type: number
        averagePrice:
          type: number
        currentPrice:
          type: number
        pnl:
          type: number
        pnlPercent:
          type: number

    AccountSummary:
      type: object
      required: [cash, invested, result, total]
      properties:
        cash:
          type: number
        invested:
          type: number
        result:
          type: number
        total:
          type: number
        currency:
          type: ["string", "null"]

    Instrument:
      type: object
      required: [id, ticker, name, enabled]
      properties:
        id:
          type: integer
        ticker:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        addedAt:
          type: string

    InstrumentInput:
      type: object
      required: [ticker, name]
      properties:
        ticker:
          type: string
        name:
          type: string
        enabled:
          type: boolean

    Signal:
      type: object
      required: [id, ticker, signal, shortMa, longMa, price, createdAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        shortMa:
          type: number
        longMa:
          type: number
        price:
          type: number
        createdAt:
          type: string
        tradeExecuted:
          type: boolean
        aiReason:
          type: ["string", "null"]
          description: Claude's plain-language reason for this decision (AI modes only).
        strategy:
          type: ["string", "null"]
          enum: [trend_following, mean_reversion, null]
          description: Which strategy produced this signal. Routed automatically by the regime filter.
        regime:
          type: ["string", "null"]
          enum: [trending, ranging, null]
          description: Market regime classified for the instrument (close-based ADX). trending → trend-following, ranging → mean-reversion.
        signalReason:
          type: ["string", "null"]
          description: Deterministic plain-language reason for this signal (no LLM).
        confidence:
          type: ["integer", "null"]
          description: Deterministic 0-100 confidence derived from MA gap and regime.
        technicalReason:
          type: ["string", "null"]
          description: Deterministic technical explanation (MA relationship / crossover).
        newsReason:
          type: ["string", "null"]
          description: News/AI context for the signal, if any.
        riskLevel:
          type: ["string", "null"]
          enum: [Low, Medium, High, null]
          description: Deterministic risk classification for acting on this signal.
        suggestedAction:
          type: ["string", "null"]
          enum: [Watch, Avoid, Consider, Review, null]
          description: Deterministic suggested action (educational, not advice).

    NewsItem:
      type: object
      required: [title, url, source, publishedAt, impactScore, impactLabel]
      properties:
        title:
          type: string
        url:
          type: string
        source:
          type: string
        publishedAt:
          type: string
        impactScore:
          type: integer
        impactLabel:
          type: string
          enum: [HIGH, MEDIUM]

    ScannerStatus:
      type: object
      required: [running, scanning, lastRunAt, nextRunAt, lastScanCount, lastHitCount, config]
      properties:
        running:
          type: boolean
        scanning:
          type: boolean
        lastRunAt:
          type: ["string", "null"]
        nextRunAt:
          type: ["string", "null"]
        lastScanCount:
          type: integer
        lastHitCount:
          type: integer
        config:
          $ref: "#/components/schemas/ScannerConfig"

    ScannerConfig:
      type: object
      required: [scanEnabled, autoTrade, minTrendStrength, scanIntervalMinutes, instrumentTypes, maxInstrumentsPerScan]
      properties:
        scanEnabled:
          type: boolean
        autoTrade:
          type: boolean
        minTrendStrength:
          type: number
          description: Minimum % gap between short and long MA to qualify as a hit
        scanIntervalMinutes:
          type: integer
        instrumentTypes:
          type: array
          items:
            type: string
        maxInstrumentsPerScan:
          type: integer

    ScannerConfigInput:
      type: object
      properties:
        scanEnabled:
          type: boolean
        autoTrade:
          type: boolean
        minTrendStrength:
          type: number
        scanIntervalMinutes:
          type: integer
        instrumentTypes:
          type: array
          items:
            type: string
        maxInstrumentsPerScan:
          type: integer

    ScannerResult:
      type: object
      required: [id, ticker, name, signal, shortMa, longMa, price, trendStrength, autoTraded, scannedAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        name:
          type: string
        signal:
          type: string
          enum: [BUY, SELL]
        shortMa:
          type: number
        longMa:
          type: number
        price:
          type: number
        trendStrength:
          type: number
        autoTraded:
          type: boolean
        orderId:
          type: ["string", "null"]
        scannedAt:
          type: string

    BacktestPoint:
      type: object
      required: [i, equity]
      properties:
        i:
          type: integer
          description: Bar index into the price series.
        equity:
          type: number

    BacktestResult:
      type: object
      required:
        [ticker, name, strategy, totalTrades, wins, losses, winRate, avgWinPct, avgLossPct, maxDrawdownPct, totalReturnPct, expectancyPct, profitFactor, costPct, equityCurve, bars]
      properties:
        ticker:
          type: string
        name:
          type: string
        strategy:
          type: string
          enum: [trend_following, mean_reversion, atr_momentum]
          description: >
            atr_momentum is backtest-only — it is never emitted by the live regime router
            (Signal.strategy / ActivityItem.strategy), only by this ephemeral endpoint.
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        winRate:
          type: number
          description: Fraction 0..1 of closed trades that were profitable.
        avgWinPct:
          type: number
          description: Mean return of winning trades, as a fraction.
        avgLossPct:
          type: number
          description: Mean return of losing trades, as a fraction (negative).
        maxDrawdownPct:
          type: number
          description: Largest peak-to-trough equity decline, as a fraction.
        totalReturnPct:
          type: number
          description: Total compounded return over the window, as a fraction (net of costs).
        expectancyPct:
          type: number
          description: "Per-trade expectancy / edge: (winRate·avgWin) − (lossRate·|avgLoss|) − cost, as a fraction. > 0 means a net positive edge on this window."
        profitFactor:
          type: number
          nullable: true
          description: Gross wins ÷ gross losses (pre-cost). null when there were no losing trades.
        costPct:
          type: number
          description: >
            Round-trip cost fraction applied to this instrument's backtest, auto-derived from its
            live bid/offer spread ((offer − bid) / price) at the time the backtest ran — not a
            manually-set value. 0 when a live quote could not be fetched (e.g. Trading 212, which
            has no live-quote endpoint), treated as frictionless for that instrument rather than a
            report failure.
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/BacktestPoint"
        bars:
          type: integer
          description: Number of price bars used.

    BacktestReport:
      type: object
      required: [broker, shortPeriod, longPeriod, historyBars, barResolution, generatedAt, results]
      properties:
        broker:
          type: string
        shortPeriod:
          type: integer
        longPeriod:
          type: integer
        historyBars:
          type: integer
        barResolution:
          type: string
          enum: [MINUTE, MINUTE_5, MINUTE_15, MINUTE_30, HOUR, HOUR_4, DAY, WEEK]
          description: Which candle resolution historyBars were fetched at — e.g. 300 bars is ~25 trading hours at MINUTE_5 but ~12.5 days at HOUR. Use this to caption results honestly rather than implying a longer history than was actually tested.
        generatedAt:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/BacktestResult"

    ActivityItem:
      type: object
      required: [id, type, ticker, timestamp]
      properties:
        id:
          type: string
          description: Prefixed id, e.g. "signal-12", "trade-7", "scan-3".
        type:
          type: string
          enum: [scan, signal, trade]
        ticker:
          type: string
        name:
          type: ["string", "null"]
        signal:
          type: ["string", "null"]
          enum: [BUY, SELL, HOLD, null]
        timestamp:
          type: string
        price:
          type: number
        shortMa:
          type: ["number", "null"]
        longMa:
          type: ["number", "null"]
        trendStrength:
          type: ["number", "null"]
        strategy:
          type: ["string", "null"]
          enum: [trend_following, mean_reversion, null]
        regime:
          type: ["string", "null"]
          enum: [trending, ranging, null]
        autoTraded:
          type: ["boolean", "null"]
        aiReason:
          type: ["string", "null"]
        aiConfidence:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
          enum: [FILLED, FAILED, DRY_RUN, null]
        side:
          type: ["string", "null"]
          enum: [BUY, SELL, null]
        quantity:
          type: ["number", "null"]
        total:
          type: ["number", "null"]
        errorMessage:
          type: ["string", "null"]

    ActivityFeed:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    Conversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time

    AssistantMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    ConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    ConversationWithMessages:
      type: object
      required: [id, title, createdAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AssistantMessage"

    AssistantError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MarketUpdate:
      type: object
      required:
        - name
        - bias
        - support
        - resistance
        - summary
      properties:
        name:
          type: string
          description: Market name, e.g. "Crude Oil WTI"
        bias:
          type: string
          description: Overall market bias / directional lean
        support:
          type: string
          description: Key support level(s)
        resistance:
          type: string
          description: Key resistance level(s)
        summary:
          type: string
          description: Short, plain-language paragraph covering the outlook, key news/risks and what to watch

    DailyMarketBrief:
      type: object
      required: [id, markets, disclaimer, createdAt]
      properties:
        id:
          type: integer
        markets:
          type: array
          items:
            $ref: "#/components/schemas/MarketUpdate"
        disclaimer:
          type: string
        createdAt:
          type: string
          format: date-time

    LatestDailyBriefResult:
      type: object
      required: [brief]
      properties:
        brief:
          oneOf:
            - $ref: "#/components/schemas/DailyMarketBrief"
            - type: "null"

    Candle:
      type: object
      required: [time, open, high, low, close]
      properties:
        time:
          type: integer
          description: Candle open time as a UNIX timestamp in seconds
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number

    MarketNewsItem:
      type: object
      required: [id, title, url, source, impactScore, impactLabel]
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        source:
          type: string
        publishedAt:
          type: ["string", "null"]
        impactScore:
          type: integer
        impactLabel:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        createdAt:
          type: string

    MarketNewsList:
      type: object
      required: [items, mock]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MarketNewsItem"
        mock:
          type: boolean
          description: True when sample data is shown because no live news was available

    AnalyseNewsInput:
      type: object
      required: [headline]
      properties:
        headline:
          type: string
        source:
